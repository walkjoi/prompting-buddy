name: Skill Eval Comparison

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "references/**"
      - "evals/**"
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "references/**"
      - "evals/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run eval comparison
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./scripts/run-evals.sh "ci-${{ github.run_number }}"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_number }}
          path: prompting-buddy-workspace/ci-${{ github.run_number }}/
          retention-days: 30

      - name: Summarize results
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKSPACE="prompting-buddy-workspace/ci-${{ github.run_number }}"

          # Generate a short comparison summary via Claude
          SUMMARY=$(claude -p "Read all files under $WORKSPACE. For each eval, compare with_skill vs without_skill outputs. Write a concise markdown summary table: eval id, with_skill line count, without_skill line count, key quality differences. Keep it under 30 lines." --output-format text 2>/dev/null || echo "Summary generation failed. Check artifacts for raw results.")

          # Post as PR comment
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## Skill Eval Results

          $SUMMARY

          Full results in [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."
